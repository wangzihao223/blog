name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go (for Hugo Modules)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.150.0"
          extended: true

      # Hugo's Dart Sass transpiler needs the official Dart Sass distribution
      # (the npm "sass" package does not support Hugo's embedded protocol).
      - name: Install Dart Sass
        run: |
          curl -L -o dart-sass.tar.gz "https://github.com/sass/dart-sass/releases/download/1.86.1/dart-sass-1.86.1-linux-x64.tar.gz"
          tar -xzf dart-sass.tar.gz
          echo "$PWD/dart-sass" >> "$GITHUB_PATH"
          "$PWD/dart-sass/sass" --version
          sass --version

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          DART_SASS_BINARY: sass
          HUGO_DART_SASS_BINARY: sass
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
