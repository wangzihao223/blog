baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'FAN FAN Blog'
theme = 'nostyleplease'

pagination.pagerSize = 10

[taxonomies]
tag = "tags"

[permalinks]
# 之前的规则只包含日期，同一天多篇文章会生成相同的 URL（互相覆盖），
# 导致“最新文章”列表里多个标题指向同一个链接。
# 这里把文件名加进来，保证每篇文章 URL 唯一。
posts = "/posts/:year/:month/:day/:contentbasename/"

[markup]
[markup.highlight]
style = "bw"

[params]
author = "Zihao"
description = "记录技术、产品与生活"

[params.theme_config]
show_description = true
appearance = "light"

[menu]
[[menu.header]]
name = "主页"
url = "/"
weight = 10

[[menu.header]]
name = "项目"
url = "projects"
weight = 20

[[menu.header]]
name = "文章"
url = "posts"
weight = 30

[[menu.header]]
name = "标签"
url = "tags"
weight = 40

[[menu.header]]
name = "归档"
url = "archive"
weight = 45

[[menu.header]]
name = "关于"
url = "about"
weight = 50
